<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">

    <!-- icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <header class="w-full p-4">
        <div class="flex items-center justify-between w-[90%] mx-auto ">

            <div class="logo flex items-center gap-2">
                <img width="30px" src="./assets/github-logo.png" alt="GitHub logo">
                <p class="font-semibold text-[#1F2937] text-xl">GitHub Issues Tracker</p>
            </div>

            <div class="search flex items-center gap-4">

                <div class="flex items-center gap-2 border border-gray-200 px-3 py-1 rounded">
                    <i class="ri-search-line cursor-pointer"></i>
                    <input type="text" placeholder="Search issues..." class="focus:outline-none">
                </div>

                <div class="">
                    <button class="bg-[#4A00FF] text-white px-2 py-1 rounded">
                        <i class="ri-add-line"></i>New Issue
                    </button>
                </div>

            </div>

        </div>
    </header>

    <main class="flex  justify-center h-dvh bg-[#F8FAFC]">
        <div class="w-[80%] ">
            <div class="mt-14 bg-[#FFFFFF]  py-6 rounded-xl px-4">
                <button class="bg-[#4A00FF] text-white px-2 py-1 rounded w-[5rem]">All</button>
                <button class="bg-[#4A00FF] text-white px-2 py-1 rounded w-[5rem]">Open</button>
                <button class="bg-[#4A00FF] text-white px-2 py-1 rounded w-[5rem]">Closed</button>
            </div>
            <div class="mt-4 bg-[#FFFFFF] flex items-center  justify-between pt-6 pb-4 rounded-t-xl px-4">
                <div class="flex items-center gap-2">
                    <div class="">
                        <img src="./assets/Aperture.png.png" alt="">
                    </div>
                    <div class="">
                        <p class="text-[#1F2937] font-semibold">50 Issues</p>
                        <p class="text-[#64748B] text-sm">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-2.5">
                    <div class="flex items-center gap-1">
                        <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                        <p class="font-medium text-sm">Open</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                        <p class="font-medium text-sm">Closed</p>
                    </div>
                </div>
            </div>


            <div class=" bg-[#FBFBFB]  grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-center  p-6">
                
                <div class="bg-[#FFFFFF]  shadow-2xl rounded-t-xl rounded-b-sm">
                    <div class="h-1.5 w-full bg-[#00A96E] rounded-t-xl"></div>
                    

                    <div class=" p-4  space-y-4">
                        <div class="flex items-center justify-between">
                            <img src="./assets/Open-Status.png" alt="logo">
                            <button
                                class="bg-[#FEECEC] text-[#EF4444] font-medium px-2 py-1 rounded-2xl w-[5rem]">HIGH</button>
                        </div>

                        <div class="">
                            <h1 class="text-[#000000] font-semibold text-xl ">Fix Navigation Menu On Mobile Devices</h1>
                            <p class="text-[#64748B] mt-2">The navigation menu doesn't collapse properly on mobile
                                devices...</p>
                        </div>

                        <div class="flex gap-2">
                            <button class="bg-[#FEECEC] text-[#EF4444] font-medium px-2 py-1 rounded-2xl w-[5rem]"><i
                                    class="ri-bug-line"></i> BUG</button>
                            <div class="flex items-center bg-[#FEECEC] font-medium px-2 py-1 rounded-2xl w-fit">
                                <img src="./assets/Lifebuoy.png" alt="Lifebuoy">
                                <button class=" text-[#EF4444] font-medium px-2 py-1 rounded-2xl ">Help Wanted</button>
                            </div>
                        </div>
                    </div>

             

                    <div class="p-4 border-t border-gray-200">
                        <p class="text-[#64748B]">#1 by john_doe</p>
                        <p class="text-[#64748B] mt-2">1/15/2024</p>
                    </div>
                </div>
               
            </div>
        </div>
    </main>
</body>

</html>
